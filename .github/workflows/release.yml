name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: deployment
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Formatextension.slnx

      - name: Build
        run: dotnet build Formatextension.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Formatextension.slnx --configuration Release --no-build --verbosity normal

      - name: Set version from tag
        run: echo "PACKAGE_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Pack
        run: dotnet pack src/Formatextension.Analyzers/Formatextension.Analyzers.csproj --configuration Release --no-build --output staging/ /p:Version=${{ env.PACKAGE_VERSION }}

      - name: Push to NuGet
        run: |
          dotnet nuget push "staging/*.nupkg" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: staging/*.nupkg
          generate_release_notes: true

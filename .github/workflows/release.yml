name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: deployment
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag follows SemVer
        run: |
          TAG="${{ github.ref_name }}"
          if ! echo "$TAG" | grep -qP '^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(-[a-zA-Z0-9]+(\.[a-zA-Z0-9]+)*)?$'; then
            echo "❌ Tag '$TAG' does not follow SemVer format: vMAJOR.MINOR.PATCH[-PRERELEASE]"
            echo "   Examples: v1.0.0, v2.3.4-beta, v1.0.0-rc.1"
            exit 1
          fi
          echo "✓ Tag '$TAG' follows SemVer format"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore FormatExtension.slnx

      - name: Build
        run: dotnet build FormatExtension.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test FormatExtension.slnx --configuration Release --no-build --verbosity normal

      - name: Set version from tag
        run: echo "PACKAGE_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Pack
        run: dotnet pack src/FormatExtension.Analyzers/FormatExtension.Analyzers.csproj --configuration Release --no-build --output staging/ /p:Version=${{ env.PACKAGE_VERSION }}

      - name: Push to NuGet
        run: |
          dotnet nuget push "staging/*.nupkg" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: staging/*.nupkg
          generate_release_notes: true
